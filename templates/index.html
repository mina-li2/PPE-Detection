<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Detection System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        :root {
            --bg:        #0a0c13;
            --surface:   #111827;
            --surface2:  #1f2937;
            --border:    #374151;
            --text:      #f9fafb;
            --muted:     #6b7280;
            --blue:      #3b82f6;
            --green:     #22c55e;
            --red:       #ef4444;
            --yellow:    #f59e0b;
            --purple:    #8b5cf6;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .brand-text h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .brand-text p {
            font-size: 11px;
            color: var(--muted);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--green);
            font-weight: 600;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.8); }
        }

        .btn {
            padding: 7px 14px;
            border-radius: 7px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { background: var(--surface2); color: var(--text); }

        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #2563eb; }

        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.25);
            font-size: 11px;
            padding: 4px 10px;
        }

        .btn-danger:hover { background: rgba(239,68,68,0.2); }

        /* ── LAYOUT ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 0;
            height: calc(100vh - 60px);
        }

        .main-panel {
            padding: 20px;
            overflow-y: auto;
        }

        .side-panel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }

        .stat.blue::before  { background: var(--blue); }
        .stat.green::before { background: var(--green); }
        .stat.red::before   { background: var(--red); }
        .stat.yellow::before{ background: var(--yellow); }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
        }

        .stat.blue  .stat-value { color: var(--blue); }
        .stat.green .stat-value { color: var(--green); }
        .stat.red   .stat-value { color: var(--red); }
        .stat.yellow .stat-value{ color: var(--yellow); }

        .stat-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── ADD CAMERA ── */
        .add-cam-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-cam-bar label {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
            font-weight: 500;
        }

        .cam-input {
            flex: 1;
            min-width: 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .cam-input:focus { border-color: var(--blue); }

        .cam-hint {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ── CAMERA GRID ── */
        .cam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
        }

        .cam-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .cam-card.violation {
            border-color: rgba(239,68,68,0.6);
            box-shadow: 0 0 24px rgba(239,68,68,0.12);
        }

        .cam-card.safe {
            border-color: rgba(34,197,94,0.4);
        }

        .cam-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .cam-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .cam-status {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
        }

        .cam-status.active   { background: var(--green); animation: pulse 2s infinite; }
        .cam-status.violation{ background: var(--red);   animation: pulse 1s infinite; }

        .cam-feed {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .cam-feed img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .no-signal {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--muted);
        }

        .no-signal-icon { font-size: 28px; opacity: 0.4; }
        .no-signal-text { font-size: 12px; }

        .cam-footer {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .pill-blue {
            background: rgba(59,130,246,0.12);
            color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.2);
        }

        .pill-red {
            background: rgba(239,68,68,0.12);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .pill-green {
            background: rgba(34,197,94,0.12);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.2);
        }

        /* ── SIDE PANEL ── */
        .side-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .side-header h3 {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-badge {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        .btn-clear-all {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 5px;
        }

        .btn-clear-all:hover { background: var(--surface2); color: var(--text); }

        .alerts-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .no-alerts {
            text-align: center;
            color: var(--muted);
            padding: 40px 20px;
            font-size: 13px;
        }

        .no-alerts-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

        /* ── ALERT CARD ── */
        .alert-card {
            background: var(--surface2);
            border: 1px solid rgba(239,68,68,0.25);
            border-left: 3px solid var(--red);
            border-radius: 8px;
            padding: 12px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .alert-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .alert-cam-label {
            font-size: 12px;
            font-weight: 700;
            color: #f87171;
        }

        .alert-time-label {
            font-size: 10px;
            color: var(--muted);
        }

        .alert-violations {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .alert-violation-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #fca5a5;
        }

        .alert-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="brand">
        <div class="brand-icon">🦺</div>
        <div class="brand-text">
            <h1>PPE Detection System</h1>
            <p>Safety Compliance Monitoring</p>
        </div>
    </div>
    <div class="navbar-right">
        <div class="live-badge">
            <span class="live-dot"></span> LIVE
        </div>
        <a href="/logout" class="btn btn-ghost">Sign Out</a>
    </div>
</nav>

<div class="layout">
    <!-- MAIN -->
    <div class="main-panel">

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat blue">
                <div class="stat-label">Active Cameras</div>
                <div class="stat-value" id="stat-cameras">0</div>
                <div class="stat-sub">Streams online</div>
            </div>
            <div class="stat green">
                <div class="stat-label">Workers Detected</div>
                <div class="stat-value" id="stat-workers">0</div>
                <div class="stat-sub">In frame right now</div>
            </div>
            <div class="stat red">
                <div class="stat-label">Live Violations</div>
                <div class="stat-value" id="stat-violations">0</div>
                <div class="stat-sub">Missing equipment</div>
            </div>
            <div class="stat yellow">
                <div class="stat-label">Alerts Fired</div>
                <div class="stat-value" id="stat-alerts">0</div>
                <div class="stat-sub">This session</div>
            </div>
        </div>

        <!-- ADD CAMERA -->
        <div class="add-cam-bar">
            <label>Add Camera:</label>
            <input class="cam-input" type="text" id="cam-input"
                placeholder="0  or  rtsp://user:pass@192.168.1.x:554/stream  or  YouTube URL">
            <button class="btn btn-primary" onclick="addCamera()">+ Add Camera</button>
            <span class="cam-hint">0 = laptop webcam</span>
        </div>

        <!-- CAMERA GRID -->
        <div class="cam-grid" id="cam-grid">
            <!-- injected by JS -->
        </div>

    </div>

    <!-- SIDE PANEL: ALERTS -->
    <div class="side-panel">
        <div class="side-header">
            <h3>🚨 Violation Alerts <span class="alert-badge" id="alert-badge">0</span></h3>
            <button class="btn-clear-all" onclick="clearAlerts()">Clear all</button>
        </div>
        <div class="alerts-scroll" id="alerts-scroll">
            <div class="no-alerts" id="no-alerts-msg">
                <div class="no-alerts-icon">✅</div>
                <div>All clear — no violations detected</div>
            </div>
        </div>
    </div>
</div>

<script>
const socket = io({ transports: ['websocket', 'polling'] });
const cameraStates = {};
let totalAlerts = 0;

socket.on('connect', () => {
    console.log('Connected:', socket.id);
    loadCameras();
});

socket.on('connect_error', err => console.error('Socket error:', err));

socket.on('frame', data => {
    const { cam_id, frame, person_count, violations, violation_count } = data;

    const img      = document.getElementById('img-' + cam_id);
    const noSig    = document.getElementById('nosig-' + cam_id);
    const wBadge   = document.getElementById('workers-' + cam_id);
    const vBadge   = document.getElementById('vbadge-' + cam_id);
    const card     = document.getElementById('card-' + cam_id);
    const statusDot= document.getElementById('status-' + cam_id);

    if (img && frame) {
        img.src = 'data:image/jpeg;base64,' + frame;
        img.style.display = 'block';
        if (noSig) noSig.style.display = 'none';
    }

    if (wBadge) wBadge.textContent = '👷 ' + person_count + ' worker' + (person_count !== 1 ? 's' : '');

    if (vBadge) {
        if (person_count === 0) {
            vBadge.className = 'pill pill-blue';
            vBadge.textContent = '— No workers in frame';
        } else if (violations && violations.length > 0) {
            vBadge.className = 'pill pill-red';
            vBadge.textContent = '⚠ ' + violation_count + ' violation' + (violation_count !== 1 ? 's' : '');
        } else {
            vBadge.className = 'pill pill-green';
            vBadge.textContent = '✓ All PPE Compliant';
        }
    }

    if (card) {
        card.classList.toggle('violation', violations && violations.length > 0);
        card.classList.toggle('safe', !violations || violations.length === 0);
    }

    if (statusDot) {
        statusDot.className = violations && violations.length > 0
            ? 'cam-status violation' : 'cam-status active';
    }

    cameraStates[cam_id] = { person_count, violations, violation_count };
    updateStats();
});

socket.on('alert', data => addAlert(data));

function loadCameras() {
    fetch('/api/cameras')
        .then(r => r.json())
        .then(data => {
            data.cameras.forEach(id => createCard(id));
            updateStats();
            setTimeout(() => {
                data.cameras.forEach(id => socket.emit('start_stream', { cam_id: id }));
            }, 500);
        });
}

function addCamera() {
    const raw = document.getElementById('cam-input').value.trim();
    if (!raw) return;
    // Send as string always — backend converts "0"/"1" to int device index
    fetch('/api/add_camera', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: raw })
    })
    .then(r => r.json())
    .then(d => {
        const id = d.cam_id;
        document.getElementById('cam-input').value = '';
        if (!document.getElementById('card-' + id)) createCard(id);
        setTimeout(() => socket.emit('start_stream', { cam_id: id }), 500);
        updateStats();
    });
}

function removeCamera(camId) {
    fetch('/api/remove_camera', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cam_id: camId })
    })
    .then(()=> {
        socket.emit('stop_stream', { cam_id: camId });
        const card = document.getElementById('card-' + camId);
        if (card) card.remove();
        delete cameraStates[camId];
        updateStats();
    });
}

function createCard(camId) {
    if (document.getElementById('card-' + camId)) return;
    const grid = document.getElementById('cam-grid');
    const d = document.createElement('div');
    d.className = 'cam-card';
    d.id = 'card-' + camId;

    const label = typeof camId === 'string' && camId.length > 10
        ? 'IP Camera'
        : 'Camera ' + camId;

    d.innerHTML = `
        <div class="cam-header">
            <div class="cam-title">
                <span class="cam-status" id="status-${camId}"></span>
                📹 ${label}
            </div>
            <button class="btn btn-danger" onclick="removeCamera(${JSON.stringify(camId)})">Remove</button>
        </div>
        <div class="cam-feed">
            <img id="img-${camId}" alt="feed">
            <div class="no-signal" id="nosig-${camId}">
                <div class="no-signal-icon">📷</div>
                <div class="no-signal-text">Connecting...</div>
            </div>
        </div>
        <div class="cam-footer">
            <span class="pill pill-blue" id="workers-${camId}">👷 0 workers</span>
            <span class="pill" id="vbadge-${camId}">— Waiting</span>
            <span style="font-size:10px;color:var(--muted)">ID: ${camId}</span>
        </div>
    `;
    grid.appendChild(d);
    cameraStates[camId] = { person_count: 0, violations: [], violation_count: 0 };
}

function updateStats() {
    let workers = 0, violations = 0;
    Object.values(cameraStates).forEach(s => {
        workers    += s.person_count    || 0;
        violations += s.violation_count || 0;
    });
    document.getElementById('stat-cameras').textContent    = Object.keys(cameraStates).length;
    document.getElementById('stat-workers').textContent    = workers;
    document.getElementById('stat-violations').textContent = violations;
}

const violationIcons = {
    'no-helmet':  '⛑️',
    'no-vest':    '🦺',
    'no-gloves':  '🧤',
    'no-goggles': '🥽',
    'no-boots':   '👢'
};

function addAlert(data) {
    totalAlerts++;
    document.getElementById('stat-alerts').textContent = totalAlerts;
    document.getElementById('alert-badge').textContent = totalAlerts;

    const noMsg = document.getElementById('no-alerts-msg');
    if (noMsg) noMsg.remove();

    const scroll = document.getElementById('alerts-scroll');
    const card = document.createElement('div');
    card.className = 'alert-card';

    const label = typeof data.cam_id === 'string' && data.cam_id.length > 10
        ? 'IP Camera' : 'Camera ' + data.cam_id;

    const rows = (data.details || data.violations || []).map((v, i) => {
        const raw = data.violations ? data.violations[i] : v;
        const icon = violationIcons[raw] || '⚠️';
        return `<div class="alert-violation-row">${icon} <span>${v}</span></div>`;
    }).join('');

    card.innerHTML = `
        <div class="alert-top">
            <span class="alert-cam-label">⚠️ ${label}</span>
            <span class="alert-time-label">${data.timestamp || new Date().toLocaleTimeString()}</span>
        </div>
        <div class="alert-violations">${rows}</div>
        <div class="alert-footer">
            👷 ${data.worker_count || 0} worker(s) detected in frame
        </div>
    `;

    scroll.insertBefore(card, scroll.firstChild);
    const cards = scroll.querySelectorAll('.alert-card');
    if (cards.length > 50) cards[cards.length - 1].remove();
}

function clearAlerts() {
    document.getElementById('alerts-scroll').innerHTML =
        '<div class="no-alerts" id="no-alerts-msg"><div class="no-alerts-icon">✅</div><div>All clear — no violations detected</div></div>';
    totalAlerts = 0;
    document.getElementById('alert-badge').textContent = '0';
    document.getElementById('stat-alerts').textContent = '0';
}
</script>
</body>
</html>
